<script type="text/javascript">
function bindSuggest(obj) {
	
	var url = "suggest/index";
	var selector = obj!=null ? ('#'+obj.target.id) : 'a.selected';
	url += $(selector).attr('id') == 'tab08' ? '?type=intraproducts' : '';
	
	$(".ipt-01").filter(function(){return $(this).parents('div.search-ipt')[0].style.display=='block';}).add($(".ipt-02:first")).suggest(url,{
		minchars: 1,
		delay: 0,
		onSelect: function() {$(this).parents('form').submit();}
	});
	
}
$(function() {
	$('a').filter(function(){return this.id.match(/tab0\d+/);}).each(function(){$(this).click(bindSuggest);});
	bindSuggest(null);
});
</script>

<script type="text/javascript">

function submit_form(form,type){
    var value = form.elements[0].value.replace(/^\s+|\s+$/g,'');
    if(value == ''){
       form.elements['q'].focus();
       alert('请输入搜索关键词');
       return false;
    }
    return true;
}
function submit_wb_form(form,type) {
    var value = form.elements[0].value.replace(/^\s+|\s+$/g,'');
    if(value == ''){
        form.elements['q'].focus();
        
    }
    if(typeof type != 'undefined'){
        if(type == 't'){
            location.href = value ? 'https://s.weibo.com/weibo/'+encodeURIComponent(value) : 'https://s.weibo.com/';
            return false;
        }
    }
    return true;
}

            function linkPost2(linkstr) {

                temp.action = "news";
                temp.method = "post";
                temp.style.display = "none";

                    opt.name = key;    
                    opt.value = value;

                temp.submit();

<script type="text/javascript">



function cancelBubble( e  )
{
    if (e.stopPropagation ) e.stopPropagation();
    else e.cancelBubble = true;

function ChangeTab(event_type,css_cur){
    this.event_type = event_type || "mouseover" ;
    this.css_cur = css_cur || "cur" ;
};
ChangeTab.prototype = {
    constructor : ChangeTab , 
    curid : 0 ,
    data : [] ,
    addItem : function (bid,did){
       var that = this ;
       var _t = {}; 
       _t.btn = sina.$(bid);
       _t.cont = sina.$(did);
       
       this.data.push(_t);
       _t.cont.style.display = "none";
       (function(){
           var num = that.data.length ;
           sina.addEvent(_t.btn,that.event_type , function(){    
              that.select(num-1);
            });
       })();
       if (this.data.length == 1 ){
       }this.select(0);
    },
    select : function (id){
       var reg =  new RegExp(this.css_cur,["g"]) 
       this.data[this.curid].btn.className = this.data[this.curid].btn.className.replace(reg, "");
       this.data[this.curid].cont.style.display = "none";
       this.data[id].cont.getElementsByTagName('input')[0].value = this.data[this.curid].cont.getElementsByTagName('input')[0].value;
       this.data[id].btn.className += " " + this.css_cur ;
       this.data[id].cont.style.display = "block";
       this.curid = id ;
       
       
       try{
          if(id!=3 && id!=6){
            $(this.data[id].cont).find('input.ipt-01').focus();
          }
       }catch(e){}
    
    }
};

(function(){

    };

    
       
    
    
    
    
})();

</script>
